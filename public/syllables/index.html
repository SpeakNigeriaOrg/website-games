<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Nigeria - Syllable Game</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-overlay">
        <div id="playlist-menu">
            <h2>Choose a playlist</h2>
            <!-- Populated/enabled by app.js once sessions.json loads and
                 real per-category level counts are known (see
                 initializePlaylistMenu) - category values match
                 sessions.json's own `category` field exactly. -->
            <button class="playlist-btn" data-category="themed" onclick="selectPlaylist('themed')" disabled>Themed Levels</button>
            <button class="playlist-btn" data-category="syllable_reinforcement" onclick="selectPlaylist('syllable_reinforcement')" disabled>Syllable Practice</button>
            <button class="playlist-btn" data-category="tone_pattern" onclick="selectPlaylist('tone_pattern')" disabled>Tone Patterns</button>
            <button class="playlist-btn" data-category="endless_practice" onclick="selectPlaylist('endless_practice')" disabled>Random</button>
        </div>
    </div>

    <div id="app-wrapper">
        <!-- Slim brand bar, not a hero block: a small wordmark plus the
             theme control, kept to a single compact row so the game
             itself gets almost the entire viewport. -->
        <header id="top-bar">
            <span id="brand-mark">
                <img src="favicon.svg" alt="" width="18" height="18">
                Speak Nigeria
            </span>
            <div id="top-bar-controls">
                <button id="playlist-btn-change" class="icon-btn icon-btn-small" onclick="showPlaylistMenu()" aria-label="Change playlist" title="Change playlist">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 6h16M4 12h10M4 18h16"/>
                    </svg>
                </button>
                <select id="theme-selector" aria-label="Choose a level" title=""></select>
                <button id="fullscreen-btn" class="icon-btn icon-btn-small" onclick="toggleFullscreen()" aria-label="Toggle fullscreen" title="Toggle fullscreen">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
                    </svg>
                </button>
            </div>
        </header>

        <main id="game-container">

            <!-- Back/forward navigation flanks the image (symmetric pair),
                 not a separate text-button row. -->
            <div id="stage-row">
                <button id="prev-btn" class="icon-btn" onclick="prevWord()" aria-label="Previous word" title="Previous word">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M18 5l-8 7 8 7V5z"/>
                        <rect x="5.5" y="5" width="2.5" height="14" rx="1"/>
                    </svg>
                </button>

                <div id="prompt-container" class="prompt-container" onclick="playFullWordAudio()">
                    <img id="prompt-image" src="" alt="Listen and build" />

                    <div class="audio-overlay">
                        <svg fill="#ffffff" viewBox="0 0 24 24" width="40px" height="40px">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </div>

                    <div id="correct-badge" class="correct-badge" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="56px" height="56px">
                            <circle cx="12" cy="12" r="11" fill="var(--accent-courses)"/>
                            <path d="M6.5 12.5l3.5 3.5 7.5-8" stroke="white" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>

                </div>

                <button id="skip-btn" class="icon-btn" onclick="skipWord()" aria-label="Skip word" title="Skip word">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M6 5l8 7-8 7V5z"/>
                        <rect x="16" y="5" width="2.5" height="14" rx="1"/>
                    </svg>
                </button>
            </div>

            <!-- Transient feedback (correct/skip/error/level-complete
                 messages) as a floating overlay (fixed-positioned, see
                 style.css), not a permanently-reserved text line. -->
            <div id="toast" role="status" aria-live="polite"></div>

            <!-- Hint toggle sits beside the answer slots, but the slots
                 (not the row as a whole) are what's centered on the page -
                 the 3-column grid below keeps the hint ancillary rather
                 than shifting the slots off-center. -->
            <div id="answer-row">
                <button id="hint-btn" class="icon-btn icon-btn-small" onclick="toggleToneHint()" aria-label="Toggle tone hint" title="Show tone hint">
                    <svg viewBox="0 0 24 24" width="16" height="16">
                        <path d="M12 2a7 7 0 0 0-4 12.7c.6.4 1 1.1 1 1.8v.5h6v-.5c0-.7.4-1.4 1-1.8A7 7 0 0 0 12 2z" fill="currentColor"/>
                        <rect x="9" y="18.5" width="6" height="1.6" rx="0.8" fill="currentColor"/>
                        <rect x="9.7" y="20.6" width="4.6" height="1.4" rx="0.7" fill="currentColor"/>
                    </svg>
                </button>

                <!-- Tone-hint dots for each slot are always in the DOM (see
                     style.css) but only visible while #hint-btn is toggled
                     on (queue-slots.show-hint). -->
                <div id="queue-slots" class="slots-container"></div>

                <!-- Empty spacer, same grid column width as hint-btn's
                     column, so the middle (slots) column is truly centered
                     in the row rather than centered-minus-the-hint-button's-width. -->
                <div aria-hidden="true"></div>
            </div>

            <div id="syllable-matrix" class="syllable-matrix">

                <div class="tone-group tone-group-high" id="high-tones">
                    <span class="tone-badge" title="High tone">&#8599;</span>
                    <div class="bank-row"></div>
                </div>
                <div class="tone-group tone-group-mid" id="mid-tones">
                    <span class="tone-badge" title="Mid tone">&#8594;</span>
                    <div class="bank-row"></div>
                </div>
                <div class="tone-group tone-group-low" id="low-tones">
                    <span class="tone-badge" title="Low tone">&#8600;</span>
                    <div class="bank-row"></div>
                </div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
